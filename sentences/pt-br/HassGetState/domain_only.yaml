---
language: "pt-br"
intents:
  HassGetState:
    data:
      - sentences:
          - "<algum> {cover_classes:device_class} <esta> {cover_states:state}"
          - "(tem|há) <algum> {cover_classes:device_class} {cover_states:state} [aqui]"
        response: any
        slots:
          domain: cover

      - sentences:
          - "todas [as] {cover_classes:device_class} <esta> {cover_states:state} [aqui]"
        response: all
        slots:
          domain: cover

      - sentences:
          - "<qual> {cover_classes:device_class} <esta> {cover_states:state} [aqui]"
        response: which
        slots:
          domain: cover

      - sentences:
          - "(quantas|quantos) {cover_classes:device_class} estão {cover_states:state} [aqui]"
        response: how_many
        slots:
          domain: cover

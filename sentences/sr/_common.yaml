language: sr
responses:
  errors:
    no_intent: "袧邪卸邪谢芯褋褌, 薪械 褉邪蟹褍屑械屑"
    no_area: "袧械 锌芯褋褌芯褬懈 锌褉芯褋褌芯褉懈褬邪 褋邪 懈屑械薪芯屑 {{ area }}"
    no_domain_in_area: "袩褉芯褋褌芯褉懈褬邪 {{ area }} 薪械 锌芯褋褌芯褬懈 褍 芯泻胁懈褉褍 锌芯写褉褍褔褬邪 {{ domain }}"
    no_device_class_in_area: "袩褉芯褋褌芯褉懈褬邪 {{ area }} 薪械 褋邪写褉卸懈 {{ device_class }}"
    no_entity: "袧械 锌芯褋褌芯褬懈 薪懈 褍褉械褣邪褬 薪懈 械薪褌懈褌械褌 锌芯写 懈屑械薪芯屑 {{ entity }}"
    handle_error: "袛芯褕谢芯 褬械 写芯 薪械芯褔械泻懈胁邪薪械 谐褉械褕泻械 锌褉懈谢懈泻芯屑 芯斜褉邪写械 蟹邪褏褌械胁邪"
lists:
  color:
    values:
      - in: "斜械谢(邪|芯|褍)"
        out: "white"
      - in: "褑褉薪(邪|芯|褍)"
        out: "black"
      - in: "褑褉胁械薪(邪|芯|褍)"
        out: "red"
      - in: "薪邪褉邪薪褵邪褋褌(邪|芯|褍)"
        out: "orange"
      - in: "卸褍褌(邪|芯|褍)"
        out: "yellow"
      - in: "蟹械谢械薪(邪|芯|褍)"
        out: "green"
      - in: "锌谢邪胁(邪|芯|褍)"
        out: "blue"
      - in: "褭褍斜懈褔邪褋褌(邪|芯|褍) | 谢懈谢邪"
        out: "purple"
      - in: "斜褉邪芯薪 | 褋屑械褣(邪|械|褍)"
        out: "brown"
      - in: "褉褍卸懈褔邪褋褌(邪|芯|褍) | 褉芯蟹械"
        out: "pink"
  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  temperature_unit:
    values:
      - in: "笑|[褋褌械锌械薪[邪|懈]] (笑械谢蟹懈褬褍褋[邪]|褍 笑械谢蟹懈褬褍褋懈屑邪|笑械谢蟹懈褬褍褋芯胁懈褏)"
        out: "celsius"
      - in: "肖|[褋褌械锌械薪[邪|懈]] (肖邪褉械薪褏邪褬褌[邪]|褍 肖邪褉械薪褏邪褬褌懈屑邪|肖邪褉械薪褏邪褬褌芯胁懈褏)"
        out: "fahrenheit"
  brightness_level:
    values:
      - in: "(屑邪泻褋懈屑褍屑|薪邪褬褬邪褔械|薪邪褬胁懈褕械)"
        out: 100
      - in: "(屑懈薪懈屑褍屑|薪邪褬褋谢邪斜懈褬械|薪邪褬薪懈卸械)"
        out: 1
  on_off_states:
    values:
      - in: "褍泻褭褍褔械薪[邪|械|芯]"
        out: "on"
      - in: "懈褋泻褭褍褔械薪[邪|械|芯]"
        out: "off"
  on_off_domains:
    values:
      - in: "褋胁械褌谢[邪|芯]"
        out: "light"
      - in: "胁械薪褌懈谢邪褌芯褉[懈]"
        out: "fan"
      - in: "锌褉械泻懈写邪褔[懈]"
        out: "switch"
  cover_states:
    values:
      - in: "芯褌胁芯褉械薪[邪|械|芯]"
        out: "open"
      - in: "蟹邪褌胁芯褉械薪[邪|械|芯]"
        out: "closed"
      - in: "芯褌胁邪褉邪[褬褍] 褋械"
        out: "opening"
      - in: "蟹邪褌胁邪褉邪[褬褍] 褋械"
        out: "closing"
  cover_classes:
    values:
      - in: "褌械薪写[邪|械|褍]"
        out: "awning"
      - in: "褉芯谢械褌薪[邪|械|懈|褍]"
        out: "blind"
      - in: "蟹邪胁械褋[邪|械|褍]"
        out: "curtain"
      - in: "胁褉邪褌邪"
        out: "door"
      - in: "胁褉邪褌邪 谐邪褉邪卸械|谐邪褉邪卸薪邪 胁褉邪褌邪"
        out: "garage"
      - in: "泻邪锌懈褬[邪|械|褍]"
        out: "gate"
      - in: "褉芯谢械褌薪[邪|械|懈|褍]"
        out: "shade"
      - in: "褉芯谢械褌薪[邪|械|懈|褍]"
        out: "shutter"
      - in: "锌褉芯蟹芯褉[邪|懈|械]"
        out: "window"
  lock_states:
    values:
      - in: "蟹邪泻褭褍褔邪薪芯"
        out: "locked"
      - in: "芯褌泻褭褍褔邪薪芯"
        out: "unlocked"

  # binary_sensor
  bs_battery_states:
    values:
      - in: "锌褉邪蟹薪[械|邪]|褋谢邪斜[械|邪]|锌褉邪蟹薪芯"
        out: "on"
      - in: "薪芯褉屑邪谢薪[械|邪]|薪芯褉屑邪谢邪薪"
        out: "off"

  bs_battery_charging_states:
    values:
      - in: "锌褍薪[懈|械] [褋械]"
        out: "on"
      - in: "薪械 锌褍薪[懈|械] [褋械]"
        out: "off"

  bs_carbon_monoxide_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|邪泻褌懈胁懈褉邪薪|褍泻褭褍褔械薪)"
        out: "on"
      - in: "褔懈褋褌"
        out: "off"

  bs_cold_states:
    values:
      - in: "褏谢邪写邪薪"
        out: "on"
      - in: "薪芯褉屑邪谢邪薪"
        out: "off"

  bs_connectivity_states:
    values:
      - in: "泻芯薪械泻褌芯胁邪薪"
        out: "on"
      - in: "写懈褋泻芯薪械泻褌芯胁邪薪"
        out: "off"

  bs_door_states:
    values:
      - in: "芯褌胁芯褉械薪[邪]"
        out: "on"
      - in: "蟹邪褌胁芯褉械薪[邪]"
        out: "off"

  bs_garage_door_states:
    values:
      - in: "芯褌胁芯褉械薪[邪]"
        out: "on"
      - in: "蟹邪褌胁芯褉械薪[邪]"
        out: "off"

  bs_gas_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|邪泻褌懈胁懈褉邪薪|褍泻褭褍褔械薪)"
        out: "on"
      - in: "褔懈褋褌"
        out: "off"

  bs_heat_states:
    values:
      - in: "胁褉褍褯"
        out: "on"
      - in: "薪芯褉屑邪谢邪薪"
        out: "off"

  bs_light_states:
    values:
      - in: "写械褌械泻褌芯胁邪薪[芯]"
        out: "on"
      - in: "斜械蟹 褋胁械褌谢邪"
        out: "off"

  bs_lock_states:
    values:
      - in: "芯褌泻褭褍褔邪薪[邪]"
        out: "on"
      - in: "蟹邪泻褭褍褔邪薪[邪]"
        out: "off"

  bs_moisture_states:
    values:
      - in: "胁谢邪卸邪薪"
        out: "on"
      - in: "褋褍胁"
        out: "off"

  bs_motion_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|邪泻褌懈胁懈褉邪薪|褍泻褭褍褔械薪)"
        out: "on"
      - in: "斜械蟹 锌芯泻褉械褌邪"
        out: "off"

  bs_occupancy_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|邪泻褌懈胁懈褉邪薪|褍泻褭褍褔械薪)"
        out: "on"
      - in: "褋谢芯斜芯写薪芯"
        out: "off"

  bs_opening_states:
    values:
      - in: "芯褌胁芯褉械薪"
        out: "on"
      - in: "蟹邪褌胁芯褉械薪"
        out: "off"

  bs_plug_states:
    values:
      - in: "褍泻褭褍褔械薪"
        out: "on"
      - in: "懈褋泻褭褍褔械薪"
        out: "off"

  bs_power_states:
    values:
      - in: "(褍泻褭褍褔械薪|写械褌械泻褌芯胁邪薪邪 褋薪邪谐邪)"
        out: "on"
      - in: "(懈褋泻褭褍褔械薪[芯])"
        out: "off"

  bs_presence_states:
    values:
      - in: "(泻褍褯邪|锌褉懈褋褍褋褌胁芯)"
        out: "on"
      - in: "(胁邪薪 泻褍褯械|胁邪薪 锌褉懈褋褍褋褌胁邪)"
        out: "off"

  bs_problem_states:
    values:
      - in: "写械褌械泻褌芯胁邪薪"
        out: "on"
      - in: "ok"
        out: "off"

  bs_running_states:
    values:
      - in: "褌褉褔邪褮械"
        out: "on"
      - in: "薪械屑邪 褌褉褔邪褮邪"
        out: "off"

  bs_safety_states:
    values:
      - in: "薪械斜械蟹斜械写薪芯"
        out: "on"
      - in: "斜械蟹斜械写薪芯"
        out: "off"

  bs_smoke_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|邪泻褌懈胁懈褉邪薪|褍泻褭褍褔械薪)"
        out: "on"
      - in: "薪械屑邪 写懈屑邪"
        out: "off"

  bs_sound_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|邪泻褌懈胁懈褉邪薪|褍泻褭褍褔械薪)"
        out: "on"
      - in: "薪械屑邪 蟹胁褍泻邪"
        out: "off"

  bs_tamper_states:
    values:
      - in: "(detected|tampered with)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_update_states:
    values:
      - in: "写芯褋褌褍锌薪芯 邪卸褍褉懈褉邪褮械"
        out: "on"
      - in: "邪卸褍褉懈褉邪薪芯"
        out: "off"

  bs_vibration_states:
    values:
      - in: "(写械褌械泻褌芯胁邪薪|胁懈斜褉懈褉邪)"
        out: "on"
      - in: "(薪械屑邪 胁懈斜褉邪褑懈褬械)"
        out: "off"

  bs_window_states:
    values:
      - in: "芯褌胁芯褉械薪"
        out: "on"
      - in: "蟹邪褌胁芯褉械薪"
        out: "closed"

  shopping_list_item:
    wildcard: true

expansion_rules:
  懈屑械: "{name}"
  芯斜谢邪褋褌: "[[锌褉芯褋褌芯褉懈褬懈]|薪邪] {area}"
  褕褌邪_褬械: "锌褉懈泻邪卸懈|锌芯泻邪卸懈|泻芯褬邪 褬械|泻芯谢懈泻[邪|械|芯] [褬械|褋褍]|泻邪泻胁邪 [褬械|褋褍]|写邪 谢懈 [褬械]|褉械褑懈 [屑懈]"
  写邪_谢懈: "写邪 谢懈 [褬械|褋褍|褋械] [褋胁械]"
  泻芯褬懈_褕褌邪: "泻芯褬[懈|械] [褬械|褋褍]|褕褌邪 [褬械|褋褍]"
  芯褋胁械褌褭械薪芯褋褌: "{brightness}[%|锌芯褋褌芯|锌褉芯褑械薪邪褌邪]"
  褋胁械褌谢邪: "褋胁械褌谢[芯|邪]|芯褋胁械褌褭械褮械|褉邪褋胁械褌[邪|褍]"
  temperature: "{temperature}[掳| 褋褌械锌械薪懈] [{temperature_unit}]"
  temp: "褌械屑锌械褉邪褌褍褉(邪|械|褍)"
  邪泻褌懈胁懈褉邪褬: "褍锌邪谢懈[褕|褌械|屑芯]|褍泻褭褍褔懈[褕|褌械|屑芯]|芯褌胁芯褉懈[褕|褌械|屑芯]|锌芯写懈谐薪懈[褕|褌械|屑芯]"
  写械邪泻褌懈胁懈褉邪褬: "褍谐邪褋懈[褕|褌械|屑芯]|懈褋泻褭褍褔懈[褕|褌械|屑芯]|蟹邪褌胁芯褉懈[褕|褌械|屑芯]|褋锌褍褋褌懈[褕|褌械|屑芯]"
  锌芯写械褋懈: "锌芯写械褋懈[褕]|薪邪屑械褋褌懈[褕]|锌芯褋褌邪胁懈[褕]|褋械褌褍褬[械褕]|锌褉芯屑械薪懈[褕]|锌芯褬邪褔邪褬|褍胁械褯邪褬|褋屑邪褮懈|褍屑邪褮懈"
  泻芯褬邪_褬械: "泻芯褬邪 褬械|泻芯谢懈泻邪 褬械|泻邪泻胁邪 褬械|泻芯褬懈 褬械|泻芯谢懈泻(懈|邪|芯) [褬械]|泻芯谢懈泻芯 [褬械]|泻邪写邪 褬械|褉械褑懈 [屑懈]|泻芯褬褍|泻芯褬芯屑 褋械"
  泻芯褬邪_褬械_胁褉械写薪芯褋褌_褋械薪蟹芯褉邪: "<泻芯褬邪_褬械> <class> [褍|薪邪] [锌芯泻邪蟹褍褬械] [褋械薪蟹芯褉|褋械薪蟹芯褉邪] [锌芯泻邪蟹褍褬械] [<懈屑械>] [褋械薪蟹芯褉|褋械薪蟹芯褉邪] [(褍|薪邪) <芯斜谢邪褋褌>]|<泻芯褬邪_褬械> <class> [褋械薪蟹芯褉|褋械薪蟹芯褉邪|褍褉械褣邪褬邪] <懈屑械> [(褍|薪邪) <芯斜谢邪褋褌>]|<泻芯褬邪_褬械> <懈屑械> <class> [(褍|薪邪) <芯斜谢邪褋褌>]"  
skip_words:
  - "屑芯谢懈屑 [褌械|胁邪褋] [写邪]"
  - "屑芯卸械(褕|褌械) [谢懈] [写邪]"
  - "褏邪褬写械 [写邪]"
  - "芯写屑邪褏 [写邪]"

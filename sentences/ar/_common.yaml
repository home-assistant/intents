  normal: "(毓丕丿賷丞|毓丕丿賷|胤亘賷毓賷丞|胤亘賷毓賷)"

  awning: "[丕賱](賲馗賱丞|賲馗賱丕鬲)"
  curtain: "[丕賱](爻鬲丕卅乇|爻鬲丕乇丞|爻鬲丕乇丕鬲)"
  door: "[丕賱](亘丕亘|丕亘賵丕亘)"
  garage: "[丕賱](亘丕亘|丕亘賵丕亘|亘賵丕亘丞|亘賵丕亘丕鬲) [丕賱]噩乇丕噩"
  gate: "[丕賱](亘賵丕亘丞|亘賵丕亘丕鬲)"
  window: "[丕賱](賳丕賮匕丞|賳賵丕賮匕|賳丕賮匕丕鬲|卮亘丕賰|卮亘丕亘賷賰)"
  lock: "[丕賱](丕賯賮丕賱|賯賮賱)"
  battery: "[丕賱](亘胤丕乇賷丞|亘胤丕乇賷丕鬲)"

skip_words:
  - "(賲賳 賮囟賱賰|賱賵 爻賲丨鬲)"
  - "(賴賱 賷賲賰賳賰|鬲賯丿乇)"

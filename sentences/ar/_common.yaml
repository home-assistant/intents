language: ar
responses:
  errors:
    no_intent: "毓賮賵丕, 賱賲 丕賮賴賲 賴匕丕"
    no_area: "賱丕 鬲賵噩丿 賲賳胤賯丞 亘丕賱兀爻賲 {{ area }}"
    no_domain_in_area: "丕賱賳胤丕賯 {{ domain }} 睾賷乇 賲賵噩賵丿 亘丕賱賲賳胤賯丞 {{ area }}"
    no_device_class_in_area: "丕賱賲賳胤賯丞 {{ area }} 賱丕 鬲丨鬲賵賶 毓賱賶 賮卅丞 丕賱兀噩賴夭丞 {{ device_class }}"
    no_entity: "賱丕 賷賵噩丿 噩賴丕夭 丕賵 禺丕氐賷丞 亘丕賱兀爻賲 {{ entity }}"
    handle_error: "丨丿孬 禺胤兀 丕孬賳丕亍 賲毓丕賱噩丞 丕賱賳氐"

lists:
  color:
    values:
      - in: "丕亘賷囟"
        out: "white"
      - in: "丕爻賵丿"
        out: "black"
      - in: "丕丨賲乇"
        out: "red"
      - in: "亘乇鬲賯丕賱賷"
        out: "orange"
      - in: "丕氐賮乇"
        out: "yellow"
      - in: "丕禺囟乇"
        out: "green"
      - in: "丕夭乇賯"
        out: "blue"
      - in: "亘賳賮爻噩賷"
        out: "purple"
      - in: "亘賳賷"
        out: "brown"

  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  temperature_unit:
    values:
      - "賲卅賵賷丞"
      - in: "掳c"
        out: "celsius"
      - "賮賴乇賳賴丕賷鬲"
      - in: "f"
        out: "fahrenheit"

  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  brightness_level:
    values:
      - in: (毓丕賱賷|賯氐賵賶)
        out: 100
      - in: 賲賳禺賮囟
        out: 1

  on_off_states:
    values:
      - in: "(卮睾丕賱|[鬲|賷]毓賲賱|[賷|鬲]賵噩丿|[賷|鬲]卮丨賳)"
        out: "on"
      - in: "(賲胤賮賷|賱丕 [鬲|賷]毓賲賱|賱丕 [賷|鬲]賵噩丿|賱丕 [賷|鬲]卮丨賳)"
        out: "off"
  on_off_domains:
    values:
      - in: <light>
        out: light
      - in: <fan>
        out: fan
      - in: <switch>
        out: switch

  cover_states:
    values:
      - in: "賲賮鬲賵丨"
        out: "open"
      - in: "(賲睾賱賯|賲賯賮賵賱)"
        out: "closed"
      - in: "賷賮鬲丨"
        out: "opening"
      - in: "賷睾賱賯"
        out: "closing"
  cover_classes:
    values:
      - in: <awning>
        out: awning
      - in: <curtain>
        out: curtain
      - in: <door>
        out: door
      - in: <garage>
        out: garage
      - in: <gate>
        out: gate
      - in: <window>
        out: window

  # binary_sensor
  bs_battery_states:
    values:
      - in: "<low>"
        out: "on"
      - in: "<normal>"
        out: "off"

  bs_battery_charging_states:
    values:
      - in: "charging"
        out: "on"
      - in: "not charging"
        out: "off"

  bs_carbon_monoxide_states:
    values:
      - in: "(detected|triggered|on)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_cold_states:
    values:
      - in: "cold"
        out: "on"
      - in: "normal"
        out: "off"

  bs_connectivity_states:
    values:
      - in: "connected"
        out: "on"
      - in: "disconnected"
        out: "off"

  bs_door_states:
    values:
      - in: "open"
        out: "on"
      - in: "closed"
        out: "off"

  bs_garage_door_states:
    values:
      - in: "open"
        out: "on"
      - in: "closed"
        out: "off"

  bs_gas_states:
    values:
      - in: "(detected|triggered|on)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_heat_states:
    values:
      - in: "hot"
        out: "on"
      - in: "normal"
        out: "off"

  bs_light_states:
    values:
      - in: "detected"
        out: "on"
      - in: "no light"
        out: "off"

  bs_lock_states:
    values:
      - in: "unlocked"
        out: "on"
      - in: "locked"
        out: "off"

  bs_moisture_states:
    values:
      - in: "wet"
        out: "on"
      - in: "dry"
        out: "off"

  bs_motion_states:
    values:
      - in: "(detected|triggered|on)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_occupancy_states:
    values:
      - in: "(detected|triggered|on)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_opening_states:
    values:
      - in: "open"
        out: "on"
      - in: "closed"
        out: "off"

  bs_plug_states:
    values:
      - in: "plugged in"
        out: "on"
      - in: "unplugged"
        out: "off"

  bs_power_states:
    values:
      - in: "(powered[ on]|power detected)"
        out: "on"
      - in: "(not powered|powered off)"
        out: "off"

  bs_presence_states:
    values:
      - in: "(home|present)"
        out: "on"
      - in: "(away|not present)"
        out: "off"

  bs_problem_states:
    values:
      - in: "detected"
        out: "on"
      - in: "ok"
        out: "off"

  bs_running_states:
    values:
      - in: "running"
        out: "on"
      - in: "not running"
        out: "off"

  bs_safety_states:
    values:
      - in: "unsafe"
        out: "on"
      - in: "safe"
        out: "off"

  bs_smoke_states:
    values:
      - in: "(detected|triggered|on)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_sound_states:
    values:
      - in: "(detected|triggered|on)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_tamper_states:
    values:
      - in: "(detected|tampered with)"
        out: "on"
      - in: "clear"
        out: "off"

  bs_update_states:
    values:
      - in: "update available"
        out: "on"
      - in: "(up to date|up-to-date)"
        out: "off"

  bs_vibration_states:
    values:
      - in: "(detected|vibrating)"
        out: "on"
      - in: "(clear|not vibrating)"
        out: "off"

  bs_window_states:
    values:
      - in: "open"
        out: "on"
      - in: "clear"
        out: "closed"

expansion_rules:
  name: "[丕賱]{name}"
  area: "[丕賱]{area}"
  colors: "[丕賱]{color}"

  script: "[丕賱](亘乇賳丕賲噩|亘乇丕賲噩|賲爻丕乇|賲爻丕乇丕鬲|爻賷賳丕乇賷賵)"
  scene: "[丕賱](賲卮賴丿|賲卮丕賴丿|丕毓丿丕丿丕鬲)"

  what_is: "(賲丕 賴賵|賲丕 賴賷|賲丕匕丕 賷賰賵賳|賲丕匕丕 鬲賰賵賳|賰賲 賴賷|賰賲 賴賵)"

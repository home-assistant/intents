  intensity: "[丕賱](丿乇噩丞 [丕賱]爻胤賵毓|[卮丿丞] [丕賱]爻胤賵毓|賯賵丞|卮丿丞)"
  color: "[丕賱](賱賵賳|丕賱賵丕賳)"

  in: "(賮賷|丿丕禺賱)"
  all: "(賰賱|噩賲賷毓)"
  to: "(毓賱賶|丕賱賶)"
  any: "(兀賷)"

  open: "(丕賮鬲丨|丕乇賮毓)"
  close: "(丕睾賱賯|丕賯賮賱|丕禺賮囟|丕賳夭賱|賳夭賱)"

  low: "(賲賳禺賮囟丞|賲賳禺賮囟)"
  high: "(賲乇鬲賮毓丞|賲乇鬲賮毓)"
  full: "(賲賲鬲賱卅丞|賲賲鬲賱卅)"

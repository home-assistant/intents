  light: "[丕賱](丕囟賵丕亍|丕囟丕亍丞|囟賵亍|賲氐丕亘賷丨|賲氐亘丕丨|丕賳賵丕乇|賳賵乇|賱賲亘丞|賱賲亘丕鬲|丕賳賵丕乇)"
  switch: "[丕賱](賲賮鬲丕丨|賲賮丕鬲賷丨)"

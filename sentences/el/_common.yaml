    no_area: "螖蔚谓 蠀蟺维蟻蠂蔚喂 蟺蔚蟻喂慰蠂萎 渭蔚 蠈谓慰渭伪 {{ area }}"
    no_domain_in_area: "螚 蟺蔚蟻喂慰蠂萎 {{ area }} 未蔚谓 蟺蔚蟻喂苇蠂蔚喂 苇谓伪 {{ domain }}"
    no_device_class_in_area: "螚 蟺蔚蟻喂慰蠂萎 {{ area }} 未蔚谓 蟺蔚蟻喂苇蠂蔚喂 {{ device_class }}"
    no_entity: "螖蔚谓 蠀蟺维蟻蠂蔚喂 蟽蠀蟽魏蔚蠀萎 萎 慰谓蟿蠈蟿畏蟿伪 渭蔚 蠈谓慰渭伪 {{ entity }}"
    handle_error: "螤蟻慰苇魏蠀蠄蔚 苇谓伪 伪蟺蟻慰蟽未蠈魏畏蟿慰 蟽蠁维位渭伪 魏伪蟿维 蟿慰 蠂蔚喂蟻喂蟽渭蠈 蟿畏蟼 蟺蟻蠈胃蔚蟽畏蟼"


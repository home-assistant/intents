    multiple_timers_matched: "危蠀纬纬谓蠋渭畏, 未蔚谓 渭蟺慰蟻蠋 谓伪 蟽蟿慰蠂蔚蠉蟽蠅 蟺慰位位伪蟺位维 蠂蟻慰谓蠈渭蔚蟿蟻伪"
    no_timer_support: "危蠀纬纬谓蠋渭畏, 蟿伪 蠂蟻慰谓蠈渭蔚蟿蟻伪 未蔚谓 蠀蟺慰蟽蟿畏蟻委味慰谓蟿伪喂 蟽蔚 伪蠀蟿萎 蟿畏 蟽蠀蟽魏蔚蠀萎"
lists:
  color:
    values:
      - in: "位蔚蠀魏蠈"
        out: "white"
      - in: "渭伪蠉蟻慰"
        out: "black"
      - in: "魏蠈魏魏喂谓慰"
        out: "red"
      - in: "蟺慰蟻蟿慰魏伪位委"
        out: "orange"
      - in: "魏委蟿蟻喂谓慰"
        out: "yellow"
      - in: "蟺蟻维蟽喂谓慰"
        out: "green"
      - in: "渭蟺位蔚"
        out: "blue"
      - in: "渭蠅尾"
        out: "purple"
      - in: "魏伪蠁苇"
        out: "brown"
  brightness:
    range:
      type: "percentage"
      from: 0
      to: 100
  temperature:
    range:
      type: "temperature"
      from: 0
      to: 100
  brightness_level:
    values:
      - in: (渭苇纬喂蟽蟿慰|伪谓蠋蟿蔚蟻慰|蠀蠄畏位蠈蟿蔚蟻慰)
        out: 100
      - in: (蔚位维蠂喂蟽蟿慰|魏伪蟿蠋蟿蔚蟻慰)
        out: 1
  on_off_states:
    values:
      - in: "(伪谓慰喂(魏|蠂)蟿(蠈蟼|萎|蠈|慰委|苇蟼|维)|伪谓伪渭渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪))"
        out: "on"
      - in: "(魏位蔚喂蟽蟿|蟽尾畏蟽蟿)(蠈蟼|萎|蠈|慰委|苇蟼|维)"
        out: "off"
  on_off_domains:
    values:
      - in: (蠁蠋蟿伪|蠁蠅蟼|位维渭蟺[伪|蔚蟼]|蠁蠅蟿喂蟽渭蠈[蟼])
        out: light
      - in: (伪谓蔚渭喂蟽蟿萎蟻伪[蟼])
        out: fan
      - in: 未喂伪魏蠈蟺蟿(畏蟼|畏|蔚蟼)
        out: switch
  cover_states:
    values:
      - in: "(维谓慰喂尉蔚|维谓慰喂纬渭伪|蟽萎魏蠅蟽蔚|蟽萎魏蠅渭伪|伪谓苇尾伪蟽蔚|伪谓苇尾伪蟽渭伪)"
        out: "open"
      - in: "(魏位蔚委蟽蔚|魏位蔚委蟽喂渭慰|魏伪蟿苇尾伪蟽蔚|魏伪蟿苇尾伪蟽渭伪)"
        out: "closed"
      - in: "(维谓慰喂纬渭伪|伪谓苇尾伪蟽渭伪)"
        out: "opening"
      - in: "(魏位蔚委蟽喂渭慰|魏伪蟿维尾伪蟽渭伪)"
        out: "closing"
  cover_classes:
    values:
      - in: (蟽魏苇蟺伪蟽蟿蟻[慰|伪]|蟿苇谓蟿[伪|蔚蟼])
        out: awning
      - in: (蟻慰位维|蟻慰位蠈)
        out: blind
      - in: (魏慰蠀蟻蟿委谓[伪|蔚蟼])
        out: curtain
      - in: (蟺蠈蟻蟿[伪|蔚蟼]|胃蠉蟻[伪|蔚蟼])
        out: door
      - in: (纬魏伪蟻伪味蠈蟺慰蟻蟿伪|纬魏伪蟻伪味蠈蟺慰蟻蟿蔚蟼|纬魏伪蟻维味)
        out: garage
      - in: (蟺蠉位[畏|蔚蟼])
        out: gate
      - in: (蟽魏委伪蟽蟿蟻[慰|伪])
        out: shade
      - in: (蟺伪谓蟿味慰蠉蟻喂[伪]|蟺伪蟻伪胃蠀蟻蠈蠁蠀位位[伪|慰])
        out: shutter
      - in: (蟺伪蟻维胃蠀蟻[慰|伪])
        out: window
  lock_states:
    values:
      - in: "魏位蔚喂未蠅渭苇谓[o|畏|慰蟼]"
        out: "locked"
      - in: "尉蔚魏位蔚喂未蠅渭苇谓[o|畏|慰蟼]|尉蔚魏位蔚委未蠅蟿(慰|畏|慰蟼)"
        out: "unlocked"

  # binary_sensor
  bs_battery_states:
    values:
      - in: "蠂伪渭畏位(萎|苇蟼)"
        out: "on"
      - in: "魏伪谓慰谓喂魏(萎|苇蟼)"
        out: "off"

  bs_battery_charging_states:
    values:
      - in: "蠁慰蟻蟿委味(蔚喂|慰蠀谓)"
        out: "on"
      - in: "未蔚 蠁慰蟻蟿委味(蔚喂|慰蠀谓)"
        out: "off"

  bs_carbon_monoxide_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_cold_states:
    values:
      - in: "魏蟻蠉(慰蟼|伪|慰|慰喂|蔚蟼)"
        out: "on"
      - in: "魏伪谓慰谓喂魏(蠈蟼|萎|蠈|慰委|苇蟼|维)"
        out: "off"

  bs_connectivity_states:
    values:
      - in: "蟽蠀谓未苇胃畏魏(蔚|伪谓)"
        out: "on"
      - in: "伪蟺慰蟽蠀谓未苇胃畏魏(蔚|伪谓)"
        out: "off"

  bs_door_states:
    values:
      - in: "伪谓慰喂魏蟿(萎|苇蟼)"
        out: "on"
      - in: "魏位蔚喂蟽蟿(萎|苇蟼)"
        out: "off"

  bs_garage_door_states:
    values:
      - in: "伪谓慰喂魏蟿(萎|苇蟼)"
        out: "on"
      - in: "魏位蔚喂蟽蟿(萎|苇蟼)"
        out: "off"

  bs_gas_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_heat_states:
    values:
      - in: "(味蔚蟽蟿|胃蔚蟻渭)(蠈蟼|萎|蠈|慰委|苇蟼|维)"
        out: "on"
      - in: "魏伪谓慰谓喂魏(蠈蟼|萎|蠈|慰委|苇蟼|维)"
        out: "off"

  bs_light_states:
    values:
      - in: "(伪谓喂蠂谓蔚蠉蟿畏魏蔚 蠁蠅蟼|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚 蠁蠅蟼|伪谓蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_lock_states:
    values:
      - in: "尉蔚魏位蔚委未蠅蟿(慰蟼|畏|慰|慰喂|蔚蟼|伪)"
        out: "on"
      - in: "魏位蔚喂未蠅渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪)"
        out: "off"

  bs_moisture_states:
    values:
      - in: "(蠀纬蟻(蠈蟼|畏|慰|慰委|蔚蟼|伪)|蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|慰喂))"
        out: "on"
      - in: "(尉畏蟻(蠈蟼|畏|慰|慰喂|蔚蟼|伪)|伪蟺蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|慰喂))"
        out: "off"

  bs_motion_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|慰喂))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|慰喂))"
        out: "off"

  bs_occupancy_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|慰喂))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|慰喂))"
        out: "off"

  bs_opening_states:
    values:
      - in: "伪谓慰喂魏蟿(蠈蟼|萎|蠈|慰委|苇蟼|维)"
        out: "on"
      - in: "魏位蔚喂蟽蟿(蠈蟼|萎|蠈|慰委|苇蟼|维)"
        out: "off"

  bs_plug_states:
    values:
      - in: "(蟽蠀谓未蔚未蔚渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪) | 蟽蟿畏谓 蟺蟻委味伪)"
        out: "on"
      - in: "(伪蟺慰蟽蠀谓未蔚未蔚渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪) | 蔚魏蟿蠈蟼 蟺蟻委味伪蟼)"
        out: "off"

  bs_power_states:
    values:
      - in: "(蔚谓蔚蟻纬(蠈蟼|萎|蠈|慰委|苇蟼|维) | 蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪))"
        out: "on"
      - in: "(伪谓蔚谓蔚蟻纬(蠈蟼|萎|蠈|慰委|苇蟼|维) | 伪蟺蔚谓蔚蟻纬慰蟺慰喂畏渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪))"
        out: "off"

  bs_presence_states:
    values:
      - in: "(蟺伪蟻蠋谓|[蟽蟿慰] 蟽蟺委蟿喂)"
        out: "on"
      - in: "(伪蟺蠋谓|蔚魏蟿蠈蟼 蟽蟺喂蟿喂慰蠉)"
        out: "off"

  bs_problem_states:
    values:
      - in: "蟺蟻蠈尾位畏渭伪"
        out: "on"
      - in: "蔚谓蟿维尉蔚喂"
        out: "off"

  bs_running_states:
    values:
      - in: "(蔚魏蟿蔚位(蔚委蟿伪喂|慰蠉谓蟿伪喂) | 位蔚喂蟿慰蠀蟻纬(蔚委|慰蠉谓) | 未慰蠀位蔚蠉(蔚喂|慰蠀谓))"
        out: "on"
      - in: "未蔚谓 (蔚魏蟿蔚位(蔚委蟿伪喂|慰蠉谓蟿伪喂) | 位蔚喂蟿慰蠀蟻纬(蔚委|慰蠉谓) | 未慰蠀位蔚蠉(蔚喂|慰蠀谓))"
        out: "off"

  bs_safety_states:
    values:
      - in: "渭畏 伪蟽蠁伪位(萎蟼|畏|蔚蟼|蔚委蔚蟼|苇蟼|萎)"
        out: "on"
      - in: "伪蟽蠁伪位(萎蟼|畏|蔚蟼|蔚委蔚蟼|苇蟼|萎)"
        out: "off"

  bs_smoke_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_sound_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_tamper_states:
    values:
      - in: "(蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_update_states:
    values:
      - in: "未喂伪胃苇蟽喂渭畏 蔚谓畏渭苇蟻蠅蟽畏"
        out: "on"
      - in: "蔚谓畏渭蔚蟻蠅渭苇谓(慰蟼|畏|慰|慰喂|蔚蟼|伪|)"
        out: "off"

  bs_vibration_states:
    values:
      - in: "(未慰谓蔚委蟿伪喂|蔚谓蟿慰蟺委蟽蟿畏魏蔚|伪谓喂蠂谓蔚蠉蟿畏魏蔚|蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "on"
      - in: "(未蔚谓 未慰谓蔚委蟿伪喂|未蔚谓 蔚谓蟿慰蟺委蟽蟿畏魏蔚|未蔚谓 伪谓喂蠂谓蔚蠉蟿畏魏蔚|伪蟺蔚谓蔚蟻纬慰蟺慰喂萎胃畏魏(蔚|伪谓))"
        out: "off"

  bs_window_states:
    values:
      - in: "伪谓慰喂魏蟿(蠈|维)"
        out: "on"
      - in: "魏位蔚喂蟽蟿(蠈|维)"
        out: "closed"

  shopping_list_item:
    wildcard: true

  zone:
    wildcard: true

  # Timer lists
  timer_seconds:
    range:
      from: 1
      to: 100
  timer_minutes:
    range:
      from: 1
      to: 100
  timer_hours:
    range:
      from: 1
      to: 100
  timer_half:
    values:
      - in: "渭喂蟽(蠈|萎)"
        out: 30
      - in: "渭喂蟽蠈"
        out: 30
  timer_name:
    wildcard: true
  timer_command:

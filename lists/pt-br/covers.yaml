---
language: "pt-br"

lists:
  cover_states:
    values:
      - in: "(aberto[s]|aberta[s])"
        out: "open"
      - in: "(fechado[s]|fechada[s])"
        out: "closed"
      - in: "abrindo"
        out: "opening"
      - in: "fechando"
        out: "closing"
  cover_classes:
    values:
      - in: toldo[s]
        out: awning
      - in: persiana[s]
        out: blind
      - in: cortina[s]
        out: curtain
      - in: porta[s]
        out: door
      - in: (porta[s]|portão|portões) da garagem
        out: garage
      - in: (portão|portões|porteira[s])
        out: gate
      - in: shade[s]
        out: shade
      - in: shutter[s]
        out: shutter
      - in: janela[s]
        out: window
